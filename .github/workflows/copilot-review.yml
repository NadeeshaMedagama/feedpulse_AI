name: Copilot Code Review

on:
  pull_request:
    types: ["opened", "synchronize", "reopened", "ready_for_review"]

permissions:
  contents: read
  pull-requests: write

jobs:
  copilot-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Run Copilot review
        uses: github/copilot-reviewer@v1

