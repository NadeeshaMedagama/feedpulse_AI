name: Docker Publish

on:
  push:
    branches: ["develop", "main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  deployments: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - name: gateway
            context: ./services/gateway
            dockerfile: ./services/gateway/Dockerfile
          - name: auth-service
            context: ./services/auth-service
            dockerfile: ./services/auth-service/Dockerfile
          - name: feedback-service
            context: ./services/feedback-service
            dockerfile: ./services/feedback-service/Dockerfile
          - name: ai-service
            context: ./services/ai-service
            dockerfile: ./services/ai-service/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/feedpulse-${{ matrix.name }}
            ghcr.io/${{ github.repository_owner }}/feedpulse-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-production:
    name: Deploy to production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: publish
    environment:
      name: production
    concurrency:
      group: production-deployment
      cancel-in-progress: false
    steps:
      - name: Create deployment
        id: create_deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: true,
              description: 'Deploy production from docker-publish workflow'
            });

            core.setOutput('deployment_id', String(deployment.data.id));

      - name: Mark deployment in progress
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number('${{ steps.create_deployment.outputs.deployment_id }}'),
              state: 'in_progress',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Deploy services
        run: |
          echo "Production deployment step placeholder."
          echo "Replace this with your real deploy command (helm/kubectl/ssh/etc.)."

      - name: Mark deployment final state
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const state = process.env.JOB_STATUS === 'success' ? 'success' : 'failure';
            const environmentUrl = process.env.PRODUCTION_URL || undefined;

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number('${{ steps.create_deployment.outputs.deployment_id }}'),
              state,
              environment_url: environmentUrl,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

