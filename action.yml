name: FeedPulse CI
branding:
  icon: "check-circle"
  color: "blue"
description: "Install dependencies, run tests, and build the frontend."
inputs: {}
outputs: {}
runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: "20"
        cache: "npm"
    - name: Install dependencies
      run: npm ci
      shell: bash
    - name: Run tests
      run: npm test
      shell: bash
    - name: Build frontend
      run: npm run build
      shell: bash

